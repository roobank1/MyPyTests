name: Python Tests
on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  schedule:
    - cron: "0 */3 * * *"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  test:
    timeout-minutes: 60
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.12"]
    steps:
    - uses: actions/checkout@v4
    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
    - name: Install Playwright browsers
      run: playwright install --with-deps chromium
    - name: Run Python tests
      run: python -m pytest
      env:
        CI: "true"
    - name: Prepare GitHub Pages report
      if: ${{ !cancelled() }}
      run: |
        mkdir -p site
        cp playwright-report.html site/index.html
        cp playwright-report.html site/playwright-report.html
    - name: Upload HTML report and test outputs
      uses: actions/upload-artifact@v4
      if: ${{ !cancelled() }}
      with:
        name: pytest-html-report-${{ github.run_id }}
        path: |
          playwright-report.html
          report.html
          test-results/
          playwright-report/
        if-no-files-found: warn
        retention-days: 30
    - name: Upload Pages artifact
      uses: actions/upload-pages-artifact@v3
      if: ${{ !cancelled() && github.event_name != 'pull_request' }}
      with:
        path: site/

  deploy:
    needs: test
    if: ${{ !cancelled() && github.event_name != 'pull_request' }}
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
    - name: Deploy to GitHub Pages
      id: deployment
      uses: actions/deploy-pages@v4
